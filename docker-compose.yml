services:
  mysql:
    image: mysql:8.0
    container_name: couple-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: couple_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./couple-backend/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: couple-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: root1234
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./couple-backend
    container_name: couple-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: root123
      MINIO_ENDPOINT: http://106.15.36.179:9000
      MINIO_ACCESS_KEY: root
      MINIO_SECRET_KEY: root1234
      JWT_SECRET: couple-app-prod-secret-2026-change-to-random-string
      APP_GEOIP_DB_PATH: file:/data/geoip/GeoLite2-City.mmdb
      APP_GEOIP_MOCK_IP: ""
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/couple_db?useUnicode=true&characterEncoding=utf-8
    ports:
      - "8080:8080"

volumes:
  mysql_data:
  minio_data:
