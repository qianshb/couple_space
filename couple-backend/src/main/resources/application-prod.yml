# ============================================
# 生产环境配置
# 部署时复制为 application-prod.yml 或通过环境变量覆盖
# ============================================

server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/couple_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-random-string-in-production}
    expiration: 604800000
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:root}
    secret-key: ${MINIO_SECRET_KEY:root123}
    bucket: ${MINIO_BUCKET:couple}
  file:
    upload-dir: /data/uploads
    image-max-size: 10485760
    video-max-size: 104857600
  geoip:
    db-path: file:/data/geoip/GeoLite2-City.mmdb
    mock-ip:
